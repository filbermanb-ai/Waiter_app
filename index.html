<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shift Pro</title>

  <style>
    body{
      margin:0;
      font-family:-apple-system;
      background:#f2f2f7;
    }

    .hidden{display:none!important}

    .login{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      gap:12px;
    }

    button{
      padding:12px 16px;
      border:none;
      border-radius:12px;
      background:#007aff;
      color:white;
      font-size:16px;
    }

    .app{padding:12px}

    .top{
      display:flex;
      justify-content:space-between;
      margin-bottom:10px;
    }

    .calendar{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:6px;
    }

    .day{
      background:white;
      border-radius:10px;
      height:38px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .day.work{background:#d1fae5}

    .stats{
      margin-top:10px;
      background:white;
      padding:10px;
      border-radius:12px;
    }

    .panel{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      background:white;
      padding:12px;
      border-radius:20px 20px 0 0;
      transform:translateY(100%);
      transition:.3s;
    }

    .panel.active{transform:translateY(0)}

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.3);
      display:none;
    }

    .overlay.active{display:block}

    input{
      width:100%;
      padding:10px;
      margin:6px 0;
      border:none;
      border-radius:10px;
      background:#f2f2f7;
    }

    .toggle{
      display:flex;
      justify-content:space-between;
      margin:8px 0;
    }

    .live{
      background:#f2f2f7;
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <h2>Shift Pro</h2>
  <button id="loginBtn">Войти через Google</button>
</div>

<!-- APP -->
<div id="app" class="app hidden">

  <div class="top">
    <div id="userEmail"></div>
    <button id="logoutBtn">Выйти</button>
  </div>

  <div id="monthTitle"></div>

  <div id="calendar" class="calendar"></div>

  <div class="stats">
    <table width="100%">
      <tr>
        <th></th>
        <th>1–15</th>
        <th>16–31</th>
        <th>Итого</th>
      </tr>
      <tr>
        <td>💰</td>
        <td id="s1">0</td>
        <td id="s2">0</td>
        <td id="st">0</td>
      </tr>
      <tr>
        <td>🍵</td>
        <td id="t1">0</td>
        <td id="t2">0</td>
        <td id="tt">0</td>
      </tr>
    </table>
  </div>

</div>

<!-- PANEL -->
<div id="overlay" class="overlay"></div>

<div id="panel" class="panel">

  <div id="title"></div>

  <div class="toggle">
    🟢 Рабочий день
    <input id="work" type="checkbox">
  </div>

  <input id="rate" placeholder="Ставка">
  <input id="rev" placeholder="Выручка">
  <input id="percent" placeholder="% (4.5)">

  <div class="toggle">
    🍵 Чаевые
    <input id="tipsEnabled" type="checkbox">
  </div>

  <input id="tips" placeholder="Чаевые">

  <div class="live">
    💰 <span id="liveSalary">0</span><br/>
    🍵 <span id="liveTips">0</span>
  </div>

  <button id="save">Сохранить</button>
</div>

<script type="module" src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shift App</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: #f2f2f7;
    }

    .hidden { display: none; }

    .center {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 12px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      background: #007aff;
      color: white;
      font-size: 16px;
    }

    .app {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 14px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <h2>Shift App</h2>
  <button id="loginBtn">Войти через Google</button>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <h2>📱 Dashboard</h2>

  <div class="card">
    👤 Пользователь: <span id="user"></span>
  </div>

  <div class="card">
    💰 Приложение работает ✔
  </div>

  <button id="logoutBtn">Выйти</button>
</div>

<script type="module" src="app.js"></script>

</body>
</html>

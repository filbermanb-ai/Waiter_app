<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shift Calendar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="header">
    <div id="monthTitle"></div>
  </div>

  <div id="calendar" class="calendar"></div>

</div>

<!-- overlay -->
<div id="overlay" class="overlay" onclick="closePanel()"></div>

<!-- panel -->
<div id="panel" class="panel">

  <div id="panelTitle" class="panel-title"></div>

  <!-- 🟢 красивый toggle -->
  <div class="toggle">
    <span>Рабочий день</span>
    <label class="switch">
      <input id="work" type="checkbox" onchange="toggleWork()">
      <span class="slider"></span>
    </label>
  </div>

  <div id="inputs">

    <div class="field">
      <label>Ставка</label>
      <input id="rate" type="number">
    </div>

    <div class="field">
      <label>Выручка</label>
      <input id="rev" type="number">
    </div>

    <div class="field">
      <label>Чаевые</label>
      <input id="tips" type="number">
    </div>

  </div>

  <button onclick="saveDay()">Сохранить</button>

</div>

<script src="app.js"></script>
</body>
</html>

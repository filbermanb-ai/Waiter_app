<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Shift App</title>

  <!-- 🚀 УБРАТЬ КЭШ -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <style>
    body { font-family: Arial; margin: 0; padding: 0; }
    #login, #app { padding: 20px; }
    .hidden { display: none; }
    .profile {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #4a90e2;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="login">
  <button id="loginBtn">Войти через Google</button>
</div>

<div id="app" class="hidden">
  <div class="profile" id="profile">U</div>
  <h2>Приложение работает</h2>
</div>

<script type="module" src="app.js?v=1.0.1"></script>

</body>
</html>

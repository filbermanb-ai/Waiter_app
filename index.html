<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Shift Pro</title>

  <style>
    body{
      margin:0;
      font-family:-apple-system;
      background:#f2f2f7;
    }

    /* 🔥 FIX КНОПКИ (самое важное) */
    button{
      pointer-events:auto;
      position:relative;
      z-index:9999;
      padding:12px 16px;
      border:none;
      border-radius:12px;
      background:#007aff;
      color:white;
      font-size:16px;
    }

    .login{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:12px;
      position:relative;
      z-index:10;
    }

    .hidden{display:none!important}

    .app{padding:12px}

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .profile{
      width:36px;
      height:36px;
      border-radius:50%;
      overflow:hidden;
      background:#ddd;
    }

    .profile img{
      width:100%;
      height:100%;
    }

    .calendar{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:6px;
      margin-top:10px;
    }

    .day{
      background:white;
      height:40px;
      border-radius:10px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .day.work{background:#d1fae5}

    .panel{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      background:white;
      padding:12px;
      border-radius:20px 20px 0 0;
      transform:translateY(100%);
      transition:.3s;
      z-index:1000;
    }

    .panel.active{transform:translateY(0)}

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.3);
      display:none;
      z-index:900;
    }

    .overlay.active{display:block}

    input{
      width:100%;
      padding:10px;
      margin:6px 0;
      border:none;
      border-radius:10px;
      background:#f2f2f7;
    }

    .stats{
      margin-top:10px;
      background:white;
      padding:10px;
      border-radius:12px;
    }

    /* 🔥 критический FIX чтобы login НЕ блокировал клики */
    #login{
      position:relative;
      z-index:1;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <h2>Shift Pro</h2>
  <button id="loginBtn">Войти через Google</button>
</div>

<!-- APP -->
<div id="app" class="app hidden">

  <div class="top">
    <div id="userEmail"></div>
    <div id="profile" class="profile"></div>
  </div>

  <div id="calendar" class="calendar"></div>

  <div class="stats">
    <table width="100%">
      <tr>
        <th></th>
        <th>1–15</th>
        <th>16–31</th>
        <th>Итого</th>
      </tr>
      <tr>
        <td>💰</td>
        <td id="s1">0</td>
        <td id="s2">0</td>
        <td id="st">0</td>
      </tr>
    </table>
  </div>

</div>

<!-- PANEL -->
<div id="overlay" class="overlay"></div>

<div id="panel" class="panel">
  <input id="rate" placeholder="Ставка">
  <input id="rev" placeholder="Выручка">
  <input id="percent" placeholder="% (4.5)">

  <div>
    🟢 Рабочий день
    <input id="work" type="checkbox">
  </div>

  <button id="save">Сохранить</button>
</div>

<script type="module" src="app.js?v=1000"></script>

</body>
</html>

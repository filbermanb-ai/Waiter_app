<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shift Calendar</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f2f2f7">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="header">
    <div id="monthTitle"></div>
  </div>

  <div id="calendar" class="calendar"></div>

  <div class="stats">
    <div class="stats-title">💰 Доход</div>

    <table>
      <tr>
        <th></th>
        <th>1–15</th>
        <th>16–31</th>
        <th>Итого</th>
      </tr>

      <tr>
        <td>💰</td>
        <td id="salary1"></td>
        <td id="salary2"></td>
        <td id="salaryTotal"></td>
      </tr>

      <tr>
        <td>🍵</td>
        <td id="tips1"></td>
        <td id="tips2"></td>
        <td id="tipsTotal"></td>
      </tr>
    </table>
  </div>

</div>

<div id="overlay" class="overlay" onclick="closePanel()"></div>

<div id="panel" class="panel">

  <div id="panelTitle" class="panel-title"></div>

  <div class="toggle">
    <span>🟢 Рабочий день</span>
    <label class="switch">
      <input id="work" type="checkbox" onchange="toggleWork()">
      <span class="slider"></span>
    </label>
  </div>

  <div id="inputs">

    <div class="field">
      <label>💵 Ставка</label>
      <input id="rate" type="number">
    </div>

    <div class="field">
      <label>📊 Процент (%)</label>
      <input id="percent" type="number" value="4.5">
    </div>

    <div class="field">
      <label>📈 Выручка</label>
      <input id="rev" type="number">
    </div>

    <div class="toggle">
      <span>🍵 Чаевые</span>
      <label class="switch">
        <input id="tipsEnabled" type="checkbox" onchange="toggleTips()">
        <span class="slider"></span>
      </label>
    </div>

    <div id="tipsField" class="field">
      <label>🍵 Сумма чаевых</label>
      <input id="tips" type="number">
    </div>

    <div class="live-stats">
      <div>💰 <span id="liveSalary">0</span></div>
      <div>🍵 <span id="liveTips">0</span></div>
    </div>

  </div>

  <button onclick="saveDay()">Сохранить</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
